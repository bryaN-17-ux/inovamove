<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InovaMove</title>

    <!-- CSS -->
    <link rel="stylesheet" href="main.css">

    <!-- Fonte moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <img src="logo.png" alt="Logo InovaMove" class="logo">

        <div class="titulo">
            <h1>InovaMove</h1>
            <p>Mobilidade inclusiva para todos</p>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="container">

        <section class="menu">

            <button onclick="irPara('../Mapa e Acompanhamento/mapa.html')" class="card">
                <span class="icon">🗺️</span>
                <h2>Ver ônibus</h2>
                <p>Acompanhe em tempo real</p>
            </button>

            <button onclick="irPara('../Solicitação de ônibus/solicitacao.html')" class="card">
                <span class="icon">🚌</span>
                <h2>Pedir ônibus</h2>
                <p>Avise o motorista</p>
            </button>

            <button onclick="irPara('../Configuração de acessibilidade/acessibilidade.html')" class="card">
                <span class="icon">♿</span>
                <h2>Acessibilidade</h2>
                <p>Personalize sua experiência</p>
            </button>

            <button onclick="irPara('../Feedback/feedback.html')" class="card">
                <span class="icon">⭐</span>
                <h2>Avaliar</h2>
                <p>Deixe sua opinião</p>
            </button>

        </section>

    </main>

    <!-- RODAPÉ -->
    <footer class="footer">
        <p>© 2026 InovaMove • Projeto UVV</p>
    </footer>

    <!-- JS -->
    <script src="main.js"></script>

</body>
</html>
